
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AMC Flight Deck Entry</title>
<link rel="stylesheet" href="entry.css">
</head>
<body>
<canvas id="bg"></canvas>

<div class="hud">
  <h1>AEROMODELLING CLUB</h1>
  <p>IIT ROPAR • Flight Deck Authorization</p>

  <div class="panel">
    <button class="sys" data-key="battery">BATTERY</button>
    <button class="sys" data-key="avionics">AVIONICS</button>
    <button class="sys" data-key="engine">ENGINE</button>
    <button class="sys" data-key="navigation">NAVIGATION</button>
    <button class="sys" data-key="throttle">THROTTLE</button>
  </div>

  <div id="status">Complete startup sequence</div>
  <button id="launch" disabled>TAKE OFF</button>
</div>

<script src="entry.js"></script>
</body>
</html>
